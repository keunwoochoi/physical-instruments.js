<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="15" fill="#12151c"/>
  <!-- feather vane -->
  <path d="M48 14 C 25 18 14 37 16 50 C 33 48 46 35 48 14 Z" fill="#f5b544"/>
  <!-- central shaft carved through the vane -->
  <path d="M44 18 L 12 52" fill="none" stroke="#12151c" stroke-width="3.2" stroke-linecap="round"/>
  <!-- quill tail poking out past the vane -->
  <path d="M17 49 L 10 56" fill="none" stroke="#f5b544" stroke-width="4" stroke-linecap="round"/>
  <!-- a few barbs for feather character -->
  <g stroke="#12151c" stroke-width="2.1" stroke-linecap="round">
    <path d="M40 23 L 30 26"/>
    <path d="M35 31 L 24 34"/>
    <path d="M29 38 L 19 41"/>
  </g>
</svg>
