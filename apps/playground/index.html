<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>instruments.js playground</title>
  <style>
    :root { color-scheme: light dark; --accent: #e07840; --key-w: 44px; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 46rem; margin: 2rem auto; padding: 0 1rem;
      background: light-dark(#faf7f2, #191512); color: light-dark(#2b2118, #ece4da);
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.2rem; }
    h1 .badge {
      font-size: 0.65rem; vertical-align: middle; background: var(--accent); color: #fff;
      border-radius: 999px; padding: 0.15rem 0.6rem; margin-left: 0.5rem; letter-spacing: 0.03em;
    }
    .sub { opacity: 0.7; margin-top: 0; }
    .row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
    button, select {
      font: inherit; padding: 0.55rem 1rem; border-radius: 0.6rem; cursor: pointer;
      border: 1px solid light-dark(#d8cbbd, #4a3f35); background: light-dark(#fff, #241f1a); color: inherit;
    }
    button.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
    button:disabled { opacity: 0.45; cursor: default; }
    label { font-size: 0.85rem; opacity: 0.8; }
    input[type="range"] { accent-color: var(--accent); }
    #keys { display: flex; position: relative; margin: 1rem 0 0.4rem; user-select: none; touch-action: none; }
    .wk {
      width: var(--key-w); height: 150px; border: 1px solid light-dark(#c9bcae, #443a30);
      border-radius: 0 0 6px 6px; background: light-dark(#fffdf9, #efe9e1); margin-right: -1px; position: relative;
    }
    .bk {
      position: absolute; top: 0; width: calc(var(--key-w) * 0.62); height: 92px; z-index: 2;
      background: light-dark(#2b2118, #0d0a08); border-radius: 0 0 5px 5px; border: 1px solid #000;
    }
    .wk.down { background: var(--accent); }
    .bk.down { background: #b45525; }
    .hint { position: absolute; bottom: 6px; width: 100%; text-align: center; font-size: 0.62rem; opacity: 0.45; }
    #pads { display: none; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin: 1rem 0; }
    #pads button { padding: 1.4rem 0.5rem; font-size: 0.9rem; }
    #status { font-size: 0.8rem; opacity: 0.6; min-height: 1.2em; font-variant-numeric: tabular-nums; }
    .foot { margin-top: 1.6rem; font-size: 0.8rem; opacity: 0.6; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>instruments.js <span class="badge" id="size-badge">…</span></h1>
  <p class="sub">Physical-modeled instruments in your browser. No samples were harmed — none exist.</p>

  <div class="row">
    <button class="primary" id="play-song">▶ Play demo arrangement</button>
    <button id="stop">■ Stop</button>
    <button id="download">⬇ Render WAV offline</button>
  </div>

  <div class="row">
    <button id="midi-file-btn">🎼 Play a MIDI file…</button>
    <input type="file" id="midi-file" accept=".mid,.midi,audio/midi" style="display:none" />
    <button id="webmidi">🎹 Enable MIDI keyboard</button>
    <button id="stress" title="max out polyphony and watch for dropped quanta">🔥 Stress test</button>
    <span id="midi-info" style="font-size:0.8rem;opacity:0.65"></span>
  </div>

  <div class="row">
    <label>Instrument
      <select id="inst">
        <optgroup label="Keys">
          <option value="piano" selected>Piano (acoustic)</option>
          <option value="epiano">Electric piano</option>
        </optgroup>
        <optgroup label="Guitars">
          <option value="guitar">Acoustic guitar (nylon)</option>
          <option value="guitar-steel">Acoustic guitar (steel)</option>
          <option value="guitar-electric">Electric guitar (clean)</option>
          <option value="guitar-distorted">Electric guitar (distorted)</option>
        </optgroup>
        <optgroup label="Bass">
          <option value="bass">Electric bass guitar</option>
        </optgroup>
        <optgroup label="Drums">
          <option value="drums">Drum kit (pop)</option>
          <option value="drums-rock">Drum kit (rock)</option>
          <option value="drums-jazz">Drum kit (jazz)</option>
          <option value="drums-808">Drum kit (808)</option>
        </optgroup>
        <optgroup label="Mallets &amp; bells">
          <option value="marimba">Marimba</option>
          <option value="vibraphone">Vibraphone</option>
          <option value="glockenspiel">Glockenspiel</option>
          <option value="musicbox">Music box</option>
        </optgroup>
        <optgroup label="Synth">
          <option value="synthpad">Synth pad</option>
        </optgroup>
      </select>
    </label>
    <label>Velocity <input type="range" id="vel" min="10" max="127" value="96" /></label>
    <label>Reverb
      <select id="reverb">
        <option value="room" selected>Room</option>
        <option value="hall">Hall</option>
        <option value="plate">Plate</option>
        <option value="spring">Spring</option>
        <option value="off">Off</option>
      </select>
    </label>
  </div>

  <div id="keys"></div>
  <div id="pads"></div>
  <div id="status">loading engine…</div>

  <p class="foot">
    Keyboard: <b>Z–M</b> lower octave, <b>Q–U</b> upper,
    number row = drums when the kit is selected. <b>Space</b> = sustain pedal, <b>← →</b> = octave shift,
    click height on a key = velocity.
  </p>

  <script type="module">
    import { createEngine } from "../../packages/core/dist/index.js";
    import { parseMidi } from "../../packages/midi/dist/index.js";
    import { demoSong, DEMO_MIX } from "./demo-song.mjs";

    const $ = (id) => document.getElementById(id);
    const status = (t, isError = false) => {
      const el = $("status");
      el.textContent = t;
      el.style.cssText = isError ? "color:#d33;opacity:1;font-weight:600" : "";
      if (isError) console.error("instruments.js:", t);
    };
    window.addEventListener("error", (e) => status(`page error: ${e.message}`, true));
    window.addEventListener("unhandledrejection", (e) => status(`error: ${e.reason?.message ?? e.reason}`, true));

    // size badge: honest number = wasm (transfer-encoded) + core js
    fetch("../../packages/core/wasm/instruments_dsp.wasm").then(async (r) => {
      const kb = ((await r.arrayBuffer()).byteLength / 1024).toFixed(0);
      $("size-badge").textContent = `${kb} KB wasm, 0 samples`;
    });

    let engine = null;
    let tracks = new Map(); // instrument name -> Track

    function track(name) {
      if (!tracks.has(name)) tracks.set(name, engine.createTrack(name, { gain: 0.85 }));
      return tracks.get(name);
    }

    (async () => {
      status("compiling WASM…");
      try {
        engine = await createEngine();
        await engine.ready;
        engine.onStats((s) =>
          s.droppedQuanta > 0
            ? status(`engine live — voices: ${s.activeVoices} — ⚠ ${s.droppedQuanta} dropped quanta (processor fell behind)`, true)
            : status(`engine live — voices: ${s.activeVoices}`));
        status("engine live — play something");
        $("reverb").addEventListener("change", () => engine.setReverb($("reverb").value));
      } catch (err) {
        status(`engine failed: ${err.message}`, true); // loud on failure
        throw err;
      }
    })(); // engine at load; the first key press is the gesture that resumes the context (core resumeIfNeeded)

    // ---------- keyboard ----------
    const KEYS = "zsxdcvgbhnjm,q2w3er5t6y7u"; // C3..C5-ish chromatic run across two rows
    const BASE = 48; // C3
    const keysEl = $("keys");
    const isBlack = (m) => [1, 3, 6, 8, 10].includes(m % 12);
    const keyEls = new Map();
    let whiteX = 0;
    for (let i = 0; i < 25; i++) {
      const midi = BASE + i;
      if (!isBlack(midi)) {
        const el = document.createElement("div");
        el.className = "wk";
        el.dataset.midi = midi;
        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = (KEYS[i] ?? "").toUpperCase();
        el.appendChild(hint);
        keysEl.appendChild(el);
        keyEls.set(midi, el);
        whiteX++;
      } else {
        const el = document.createElement("div");
        el.className = "bk";
        el.dataset.midi = midi;
        el.style.left = `calc(${whiteX} * (var(--key-w) - 1px) - var(--key-w) * 0.31)`;
        keysEl.appendChild(el);
        keyEls.set(midi, el);
      }
    }

    const down = new Set();
    function noteOn(midi, vel = Number($("vel").value)) {
      if (!engine || down.has(midi)) return;
      down.add(midi);
      keyEls.get(midi)?.classList.add("down");
      const inst = $("inst").value;
      track(inst).noteOn(midi, vel);
    }
    function noteOff(midi) {
      if (!down.delete(midi)) return;
      keyEls.get(midi)?.classList.remove("down");
      track($("inst").value).noteOff(midi);
    }

    // pointer Y within the key = velocity (top ≈ pp, bottom edge ≈ ff)
    keysEl.addEventListener("pointerdown", (e) => {
      const m = e.target.dataset?.midi;
      if (m) {
        e.target.setPointerCapture(e.pointerId);
        const r = e.target.getBoundingClientRect();
        const frac = Math.min(1, Math.max(0.05, (e.clientY - r.top) / r.height));
        noteOn(+m, Math.round(24 + 103 * frac));
      }
    });
    keysEl.addEventListener("pointerup", (e) => { const m = e.target.dataset?.midi; if (m) noteOff(+m); });
    keysEl.addEventListener("pointercancel", (e) => { const m = e.target.dataset?.midi; if (m) noteOff(+m); });

    let octave = 0; // shift in octaves via ← →
    let pedalDown = false;
    window.addEventListener("keydown", (e) => {
      if (e.metaKey || e.ctrlKey) return;
      if (e.code === "Space") {
        e.preventDefault();
        if (!pedalDown && engine) {
          pedalDown = true;
          track($("inst").value).pedal(true);
          status("sustain pedal DOWN (space)");
        }
        return;
      }
      if (e.repeat) return;
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        octave = Math.max(-2, Math.min(2, octave + (e.key === "ArrowRight" ? 1 : -1)));
        status(`octave ${octave >= 0 ? "+" : ""}${octave}`);
        return;
      }
      if ($("inst").value.startsWith("drums")) {
        const pad = PAD_KEYS[e.key];
        if (pad) hitPad(pad);
        return;
      }
      const i = KEYS.indexOf(e.key.toLowerCase());
      if (i >= 0) noteOn(BASE + i + 12 * octave);
    });
    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        pedalDown = false;
        if (engine) {
          track($("inst").value).pedal(false);
          status("engine live — pedal up");
        }
        return;
      }
      const i = KEYS.indexOf(e.key.toLowerCase());
      if (i >= 0) noteOff(BASE + i + 12 * octave);
    });

    // ---------- drum pads ----------
    const PADS = [
      ["Kick", 36], ["Snare", 38], ["Hat", 42], ["Open hat", 46],
      ["Crash", 49], ["Ride", 51], ["Tom lo", 45], ["Tom hi", 50],
    ];
    const PAD_KEYS = { 1: 36, 2: 38, 3: 42, 4: 46, 5: 49, 6: 51, 7: 45, 8: 50 };
    const padsEl = $("pads");
    for (const [name, note] of PADS) {
      const b = document.createElement("button");
      b.textContent = name;
      b.addEventListener("pointerdown", () => hitPad(note));
      padsEl.appendChild(b);
    }
    function hitPad(note) {
      if (!engine) return;
      const kit = $("inst").value.startsWith("drums") ? $("inst").value : "drums";
      track(kit).noteOn(note, Number($("vel").value));
    }
    $("inst").addEventListener("change", () => {
      const drums = $("inst").value.startsWith("drums");
      padsEl.style.display = drums ? "grid" : "none";
      keysEl.style.display = drums ? "none" : "flex";
    });

    // ---------- demo song / offline render ----------
    $("play-song").addEventListener("click", async () => {
      if (!engine) return;
      $("play-song").disabled = true;
      status("playing the arrangement — 5 tracks, one engine…");
      try { await engine.play(demoSong(), { tracks: DEMO_MIX }); status("done — engine live"); }
      finally { $("play-song").disabled = false; }
    });
    $("stop").addEventListener("click", () => engine?.stop());

    // ---------- stress test: saturate the voice pool, watch droppedQuanta ----------
    $("stress").addEventListener("click", async () => {
      if (!engine) return;
      status("stress: 64 voices across 8 tracks for 10 s — watching for dropped quanta…");
      const fams = ["piano", "guitar-steel", "guitar-electric", "guitar-distorted", "bass", "marimba", "synthpad", "drums"];
      const t = fams.map((f) => track(f));
      const stop = Date.now() + 10_000;
      (function burst() {
        if (Date.now() > stop) { engine.stop(); status("stress done — check for ⚠ above (none = glitch-free)"); return; }
        t.forEach((tr, i) => {
          const midi = tr.instrument === "drums" ? [36, 38, 42, 51][Math.floor(Math.random() * 4)] : 36 + Math.floor(Math.random() * 48);
          tr.noteOn(midi, 60 + Math.floor(Math.random() * 60));
          if (tr.instrument !== "drums" && Math.random() < 0.5) setTimeout(() => tr.noteOff(midi), 300);
        });
        setTimeout(burst, 90);
      })();
    });

    // ---------- MIDI file playback (file picker + drag-drop) ----------
    async function playMidiBytes(buf, label) {
      if (!engine) { status("click Start audio first", true); return; }
      let parsed;
      try { parsed = parseMidi(buf); }
      catch (err) { status(`could not parse ${label}: ${err.message}`, true); return; }
      const title = parsed.name || label;
      status(`playing "${title}" — ${parsed.notes.length} notes, ${parsed.durationSeconds.toFixed(1)}s, ${parsed.trackCount} tracks…`);
      engine.stop();
      try {
        await engine.play(parsed.notes, { pedals: parsed.pedals });
        status(`finished "${title}" — engine live`);
      } catch (err) { status(`playback failed: ${err.message}`, true); }
    }
    $("midi-file-btn").addEventListener("click", () => $("midi-file").click());
    $("midi-file").addEventListener("change", async (e) => {
      const f = e.target.files?.[0];
      if (f) playMidiBytes(await f.arrayBuffer(), f.name);
    });
    document.body.addEventListener("dragover", (e) => e.preventDefault());
    document.body.addEventListener("drop", async (e) => {
      e.preventDefault();
      const f = e.dataTransfer?.files?.[0];
      if (f && /\.midi?$/i.test(f.name)) playMidiBytes(await f.arrayBuffer(), f.name);
    });

    // ---------- live Web MIDI input ----------
    $("webmidi").addEventListener("click", async () => {
      if (!navigator.requestMIDIAccess) { status("Web MIDI unsupported in this browser (try Chrome)", true); return; }
      try {
        const access = await navigator.requestMIDIAccess();
        const names = [];
        const hook = (input) => {
          names.push(input.name);
          input.onmidimessage = (m) => {
            if (!engine) return;
            const [st, d1, d2] = m.data;
            const type = st & 0xf0, ch = st & 0x0f;
            const target = ch === 9 ? track("drums") : track($("inst").value === "drums" ? "marimba" : $("inst").value);
            if (type === 0x90 && d2 > 0) target.noteOn(d1, d2);
            else if (type === 0x80 || (type === 0x90 && d2 === 0)) target.noteOff(d1);
            else if (type === 0xb0 && d1 === 64) target.pedal(d2 >= 64);
          };
        };
        access.inputs.forEach(hook);
        access.onstatechange = (e) => { if (e.port.type === "input" && e.port.state === "connected") hook(e.port); };
        $("midi-info").textContent = names.length ? `MIDI in: ${names.join(", ")}` : "no MIDI devices found (plug one in — hot-plug works)";
      } catch (err) { status(`MIDI access denied: ${err.message}`, true); }
    });
    $("download").addEventListener("click", async () => {
      if (!engine) return;
      status("rendering offline…");
      const wav = await engine.renderOffline(demoSong(), { tracks: DEMO_MIX });
      const url = URL.createObjectURL(new Blob([wav], { type: "audio/wav" }));
      const a = Object.assign(document.createElement("a"), { href: url, download: "instruments-js-demo.wav" });
      a.click();
      URL.revokeObjectURL(url);
      status("WAV downloaded — engine live");
    });
  </script>
</body>
</html>
