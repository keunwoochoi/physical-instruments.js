name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/audit/harness-audit.sh
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install the EXACT rustc pinned in rust-toolchain.toml (1.97.0) so CI's WASM
      # build byte-matches the committed binary — the bundle audit does an exact cmp,
      # and a moving dtolnay@stable defeated the pin.
      - run: rustup toolchain install 1.97.0 --profile minimal --target wasm32-unknown-unknown
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo build -p instruments-dsp --target wasm32-unknown-unknown --release
      - run: cp target/wasm32-unknown-unknown/release/instruments_dsp.wasm packages/core/wasm/
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: packages/core/wasm/instruments_dsp.wasm
  typescript:
    # 22.04 ships system libsndfile 1.0.31 — the version the reference receipts
    # were canonicalized against (soundfile 0.10.3 uses the SYSTEM lib, and the
    # canonicalizer pins 1.0.31 for peak identity). ubuntu-latest (24.04) is 1.2.2.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci || npm install
      - run: sudo apt-get update && sudo apt-get install -y libsndfile1  # native lib for Python `soundfile` (audit:loop, renders)
      - run: python3 -m pip install -r scripts/dev/requirements-loop.txt
      - run: npm run audit:loop
      - run: npm run typecheck --workspaces --if-present
      - run: npm run build --workspaces --if-present
      - run: node scripts/dev/test-midi.mjs
      - run: node scripts/dev/render-demo.mjs   # numeric render gates (peak/NaN/budget)
      - run: node scripts/dev/render-demo.mjs --bench
      # bundle contract needs BUILT dist + a wasm toolchain; it must run after build.
      # Install the exact pinned rustc (rust-toolchain.toml, 1.97.0) so the rebuilt
      # WASM byte-matches the committed one. A fresh versioned toolchain install
      # avoids the dtolnay@stable conflict with 22.04's partial preinstalled Rust.
      - run: rustup toolchain install 1.97.0 --profile minimal --target wasm32-unknown-unknown
      - run: npm run audit:bundle   # public bundle-size contract + shipped-WASM freshness (#46)
      - run: npm run test:transport-baseline
  e2e:
    runs-on: ubuntu-22.04   # same libsndfile 1.0.31 pin as the typescript job
    needs: [typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci || npm install
      - run: sudo apt-get update && sudo apt-get install -y libsndfile1  # native lib for Python `soundfile` (listening e2e)
      - run: python3 -m pip install -r scripts/dev/requirements-loop.txt
      - run: npm run build --workspaces --if-present
      - run: npx playwright install --with-deps chromium webkit
      - run: python3 -m http.server 8173 &
      - run: node scripts/dev/e2e-check.mjs
      - run: npm run audit:listening
      - run: LISTENING_BROWSER=webkit node scripts/dev/listening-e2e.mjs
